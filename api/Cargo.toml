# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[package]
name = "api"
version = "0.1.0"
edition = "2021"

[dependencies]
actix-web = "4"
actix-files = "0.6"
redis = "0.21"
redis-graph = { version = "0.4.2", features = ["tokio-comp"] }
reqwest = "0.11.10"
serde = { version = "1.0.137", features = ["derive"] }
lazy_static = "1.4.0"
dotenv = "0.15.0"

[profile.dev]
opt-level = 0

[profile.release]
opt-level = 3